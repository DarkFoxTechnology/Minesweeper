<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典扫雷游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="control-panel">
            <div class="mines-counter">剩余地雷：<span id="mines-count">10</span></div>
            <div class="assist-toggle">
                <label class="switch">
                    <input type="checkbox" id="assist-checkbox">
                    <span class="slider"></span>
                </label>
                <span class="assist-label">辅助提示</span>
            </div>
            <button id="bomb-btn" class="bomb-btn">
                <span class="bomb-icon">💣</span>
                <span class="bomb-count" id="bomb-count">3</span>
            </button>
            <button id="new-game">新游戏</button>
            <div class="timer">时间：<span id="time">0</span></div>
        </div>
        <div id="game-board" class="game-board"></div>
        <div id="game-status"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
